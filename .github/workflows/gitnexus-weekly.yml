name: gitnexus-weekly

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-reindex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Weekly full rebuild
        run: |
          npm run registry:build
          npm run graph:build -- --force
          npm run graph:doctor

      - name: Upload graph artifact
        uses: actions/upload-artifact@v7
        with:
          name: gitnexus-graph-weekly-${{ github.run_id }}
          path: .gitnexus/agent-graph.db
          retention-days: 30
