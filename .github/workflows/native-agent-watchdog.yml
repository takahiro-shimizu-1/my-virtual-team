name: native-agent-watchdog

on:
  workflow_run:
    workflows: ["validate", "native-agent-review"]
    types: [completed]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  checks: write
  pull-requests: write

jobs:
  rerun-blocked:
    runs-on: ubuntu-latest
    steps:
      - name: Rerun action_required workflows on native agent branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          is_native_branch() {
            echo "$1" | grep -Eq '^(copilot|claude|codex-agent|codex)/'
          }

          rerun_if_needed() {
            local run_id="$1"
            local branch="$2"
            local conclusion="$3"
            if [ "$conclusion" = "action_required" ] && is_native_branch "$branch"; then
              gh run rerun "$run_id" --repo "${{ github.repository }}" || true
            fi
          }

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            rerun_if_needed "${{ github.event.workflow_run.id }}" "${{ github.event.workflow_run.head_branch }}" "${{ github.event.workflow_run.conclusion }}"
            exit 0
          fi

          gh run list --repo "${{ github.repository }}" --limit 30 --json databaseId,conclusion,headBranch,workflowName | \
            python3 -c "import json,sys,re; data=json.load(sys.stdin); pattern=re.compile(r'^(copilot|claude|codex-agent|codex)/'); [print(f\"{item['databaseId']} {item.get('headBranch','')} {item.get('conclusion','')}\") for item in data if item.get('conclusion') == 'action_required' and pattern.match(item.get('headBranch') or '')]" | \
            while read -r run_id branch conclusion; do
              [ -n "$run_id" ] || continue
              gh run rerun "$run_id" --repo "${{ github.repository }}" || true
            done

  dispatch-agent-pr-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch verification for open native agent PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,headRefName,headRefOid \
            --limit 30 | \
            python3 -c "import json,sys,re; data=json.load(sys.stdin); pattern=re.compile(r'^(copilot|claude|codex-agent|codex)/'); [print(f\"{item['number']} {item['headRefName']} {item['headRefOid']}\") for item in data if pattern.match(item.get('headRefName') or '')]" | \
            while read -r pr_number head_branch head_sha; do
              [ -n "${pr_number:-}" ] || continue

              existing=$(gh api \
                -H "Accept: application/vnd.github+json" \
                repos/${{ github.repository }}/commits/${head_sha}/check-runs \
                --jq '[.check_runs[] | select(.name == "agent-pr-verify") | .status + ":" + (.conclusion // "")] | join(",")')

              if echo "$existing" | grep -Eq 'in_progress|queued|completed:success'; then
                continue
              fi

              gh workflow run agent-pr-verify.yml \
                --repo "${{ github.repository }}" \
                -f pr_number="$pr_number" \
                -f head_branch="$head_branch" \
                -f head_sha="$head_sha"
            done
