name: validate

on:
  push:
    branches:
      - master
      - "codex/**"
      - "copilot/**"
      - "claude/**"
      - "codex-agent/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Verify v4 contract
        run: npm run ci:verify
