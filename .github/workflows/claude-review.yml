name: claude-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base-branch

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run Claude review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN_1: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_1 }}
          CLAUDE_CODE_OAUTH_TOKEN_2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          CLAUDE_CODE_OAUTH_TOKEN_3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_3 }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ] && [ -z "${CLAUDE_CODE_OAUTH_TOKEN_1:-}" ] && [ -z "${CLAUDE_CODE_OAUTH_TOKEN_2:-}" ] && [ -z "${CLAUDE_CODE_OAUTH_TOKEN_3:-}" ]; then
            echo "body=Claude review skipped: no Claude secret configured." >> "$GITHUB_OUTPUT"
            echo "has_critical=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > /tmp/pr.diff

          cat > /tmp/review-prompt.txt <<'EOF'
          You are a senior code reviewer.
          Review this pull request diff against DESIGN_CONSTRAINTS.md if present.

          Start critical problems with "CRITICAL:".
          Start warnings with "WARNING:".
          Focus on correctness, regression risk, missing tests, and unsafe automation.
          EOF

          if [ -f "base-branch/DESIGN_CONSTRAINTS.md" ]; then
            {
              echo
              echo "## DESIGN_CONSTRAINTS"
              cat "base-branch/DESIGN_CONSTRAINTS.md"
            } >> /tmp/review-prompt.txt
          fi

          {
            echo
            echo "## PR"
            echo "Title: ${{ github.event.pull_request.title }}"
            echo
            cat /tmp/pr.diff
          } >> /tmp/review-prompt.txt

          run_claude() {
            if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
              claude -p --output-format text --model claude-opus-4-6 < /tmp/review-prompt.txt
              return $?
            fi
            for token_var in CLAUDE_CODE_OAUTH_TOKEN_1 CLAUDE_CODE_OAUTH_TOKEN_2 CLAUDE_CODE_OAUTH_TOKEN_3; do
              token="${!token_var:-}"
              if [ -z "$token" ]; then
                continue
              fi
              ANTHROPIC_API_KEY="" CLAUDE_CODE_OAUTH_TOKEN="$token" CLAUDE_NO_ANALYTICS=1 \
                claude -p --output-format text --model claude-opus-4-6 < /tmp/review-prompt.txt && return 0
            done
            return 1
          }

          REVIEW="$(run_claude || true)"
          if [ -z "$REVIEW" ]; then
            REVIEW="Claude review unavailable."
          fi

          {
            echo "body<<EOF"
            echo "$REVIEW"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if printf '%s' "$REVIEW" | grep -q "^CRITICAL:"; then
            echo "has_critical=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_critical=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Request changes
        if: steps.review.outputs.has_critical == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --request-changes \
            --body "${{ steps.review.outputs.body }}"
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label needs-human

      - name: Approve
        if: steps.review.outputs.has_critical == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --approve \
            --body "${{ steps.review.outputs.body }}"
