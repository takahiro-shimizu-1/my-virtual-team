name: claude-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      VIRTUAL_TEAM_PR_AGENT_MENTION: ${{ vars.VIRTUAL_TEAM_PR_AGENT_MENTION }}
    steps:
      - name: Build native review prompt
        id: review
        run: |
          AGENT_MENTION="${VIRTUAL_TEAM_PR_AGENT_MENTION:-@copilot}"
          AUTHOR_LOGIN="${{ github.event.pull_request.user.login }}"
          if echo "$AUTHOR_LOGIN" | tr '[:upper:]' '[:lower:]' | grep -Eq 'copilot|claude|codex'; then
            SHOULD_TRIGGER=true
          else
            SHOULD_TRIGGER=false
          fi

          if [ "$SHOULD_TRIGGER" = "true" ]; then
            BODY="$AGENT_MENTION Please inspect this pull request for correctness, regression risks, and missing tests. If you find issues, push follow-up fixes and summarize them on the PR."
          else
            BODY="Native AI review is available. Mention ${AGENT_MENTION} on this PR if you want a subscription-based coding agent to inspect or iterate on it."
          fi

          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
            echo "triggered=$SHOULD_TRIGGER"
          } >> "$GITHUB_OUTPUT"

      - name: Comment native review handoff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "${{ steps.review.outputs.body }}"
