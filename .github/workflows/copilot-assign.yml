name: copilot-assign

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  assign-copilot:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'copilot' || github.event.label.name == 'auto'
    env:
      VIRTUAL_TEAM_IMPLEMENTATION_AGENT: ${{ vars.VIRTUAL_TEAM_IMPLEMENTATION_AGENT }}
      PREFERRED_GH_TOKEN: ${{ secrets.VIRTUAL_TEAM_GH_USER_TOKEN }}
      FALLBACK_GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Launch subscription-native coding agent
        id: launch
        run: |
          if [ -z "${PREFERRED_GH_TOKEN}" ]; then
            echo "VIRTUAL_TEAM_GH_USER_TOKEN is required for autonomous native kickoff." >&2
            exit 1
          fi

          printf '%s\n' "${PREFERRED_GH_TOKEN}" | gh auth login --hostname github.com --with-token
          TOKEN_SOURCE="repo-secret-oauth"

          OUTPUT=$(python3 scripts/github-agent-task.py issue \
            --issue-number ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} 2>&1)
          STATUS=$?

          {
            echo "token_source=$TOKEN_SOURCE"
            echo "status=$STATUS"
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment kickoff result
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY="Subscription-native coding agent kickoff started automatically for this issue.\n\nToken source: \`${{ steps.launch.outputs.token_source }}\`."
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "$BODY"
