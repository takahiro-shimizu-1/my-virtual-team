name: github-ops

on:
  push:
    branches:
      - "codex/**"
  workflow_dispatch:
    inputs:
      scenario:
        description: Synthetic event type for smoke testing
        required: true
        type: choice
        default: issues
        options:
          - issues
          - issue_comment
          - pull_request_target
      prompt:
        description: Prompt or request body used in the synthetic payload
        required: false
        type: string
        default: API設計レビューをお願いします
  issues:
    types:
      - opened
      - reopened
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - opened
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bridge-live:
    if: github.event_name != 'push' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run GitHub bridge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/github-event-bridge.py handle \
            --event-name "${{ github.event_name }}" \
            --event-path "${{ github.event_path }}"

  bridge-push-smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: issues
            prompt: API設計レビューをお願いします
          - scenario: issue_comment
            prompt: 提案をまとめて、その後要件も整理して
          - scenario: pull_request_target
            prompt: API設計レビューをお願いします
    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build synthetic event
        env:
          SCENARIO: ${{ matrix.scenario }}
          PROMPT: ${{ matrix.prompt }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib

          scenario = os.environ["SCENARIO"]
          prompt = os.environ["PROMPT"]
          path = pathlib.Path(os.environ["RUNNER_TEMP"]) / "github-ops-event.json"

          if scenario == "issues":
              payload = {
                  "repository": {"full_name": os.environ["GITHUB_REPOSITORY"]},
                  "issue": {
                      "number": 1,
                      "title": prompt,
                      "body": "workflow_dispatch smoke test",
                  },
              }
          elif scenario == "issue_comment":
              payload = {
                  "repository": {"full_name": os.environ["GITHUB_REPOSITORY"]},
                  "issue": {
                      "number": 1,
                      "title": prompt,
                      "body": "workflow_dispatch smoke test",
                  },
                  "comment": {
                      "body": "/vt plan",
                      "author_association": "MEMBER",
                  },
                  "sender": {"login": "github-actions-manual"},
              }
          else:
              payload = {
                  "repository": {"full_name": os.environ["GITHUB_REPOSITORY"]},
                  "pull_request": {
                      "number": 1,
                      "title": prompt,
                      "body": "workflow_dispatch smoke test",
                  },
              }

          path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          print(path)
          PY

      - name: Run GitHub bridge smoke
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/github-event-bridge.py handle \
            --event-name "${{ matrix.scenario }}" \
            --event-path "$RUNNER_TEMP/github-ops-event.json" \
            --dry-run

  bridge-manual-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build synthetic event
        env:
          SCENARIO: ${{ inputs.scenario }}
          PROMPT: ${{ inputs.prompt }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib

          scenario = os.environ["SCENARIO"]
          prompt = os.environ["PROMPT"]
          path = pathlib.Path(os.environ["RUNNER_TEMP"]) / "github-ops-event.json"

          if scenario == "issues":
              payload = {
                  "repository": {"full_name": os.environ["GITHUB_REPOSITORY"]},
                  "issue": {
                      "number": 1,
                      "title": prompt,
                      "body": "workflow_dispatch smoke test",
                  },
              }
          elif scenario == "issue_comment":
              payload = {
                  "repository": {"full_name": os.environ["GITHUB_REPOSITORY"]},
                  "issue": {
                      "number": 1,
                      "title": prompt,
                      "body": "workflow_dispatch smoke test",
                  },
                  "comment": {
                      "body": "/vt plan",
                      "author_association": "MEMBER",
                  },
                  "sender": {"login": "github-actions-manual"},
              }
          else:
              payload = {
                  "repository": {"full_name": os.environ["GITHUB_REPOSITORY"]},
                  "pull_request": {
                      "number": 1,
                      "title": prompt,
                      "body": "workflow_dispatch smoke test",
                  },
              }

          path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          print(path)
          PY

      - name: Run GitHub bridge smoke
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/github-event-bridge.py handle \
            --event-name "${{ inputs.scenario }}" \
            --event-path "$RUNNER_TEMP/github-ops-event.json" \
            --dry-run
