name: github-ops

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Synthetic event type for smoke testing
        required: true
        type: choice
        default: issues
        options:
          - issues
          - issue_comment
          - pull_request_target
      prompt:
        description: Prompt or request body used in the synthetic payload
        required: false
        type: string
        default: API設計レビューをお願いします
  issues:
    types:
      - opened
      - reopened
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
      - opened
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout workflow branch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Checkout default branch
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build synthetic event
        if: github.event_name == 'workflow_dispatch'
        env:
          SCENARIO: ${{ inputs.scenario }}
          PROMPT: ${{ inputs.prompt }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib

          scenario = os.environ["SCENARIO"]
          prompt = os.environ["PROMPT"]
          path = pathlib.Path(os.environ["RUNNER_TEMP"]) / "github-ops-event.json"

          if scenario == "issues":
              payload = {
                  "repository": {"full_name": os.environ["GITHUB_REPOSITORY"]},
                  "issue": {
                      "number": 1,
                      "title": prompt,
                      "body": "workflow_dispatch smoke test",
                  },
              }
          elif scenario == "issue_comment":
              payload = {
                  "repository": {"full_name": os.environ["GITHUB_REPOSITORY"]},
                  "issue": {
                      "number": 1,
                      "title": prompt,
                      "body": "workflow_dispatch smoke test",
                  },
                  "comment": {
                      "body": "/vt plan",
                      "author_association": "MEMBER",
                  },
                  "sender": {"login": "github-actions-manual"},
              }
          else:
              payload = {
                  "repository": {"full_name": os.environ["GITHUB_REPOSITORY"]},
                  "pull_request": {
                      "number": 1,
                      "title": prompt,
                      "body": "workflow_dispatch smoke test",
                  },
              }

          path.write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          print(path)
          PY

      - name: Run GitHub bridge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            EVENT_NAME="${{ inputs.scenario }}"
            EVENT_PATH="$RUNNER_TEMP/github-ops-event.json"
            EXTRA_ARGS="--dry-run"
          else
            EVENT_NAME="${{ github.event_name }}"
            EVENT_PATH="${{ github.event_path }}"
            EXTRA_ARGS=""
          fi
          python3 scripts/github-event-bridge.py handle \
            --event-name "$EVENT_NAME" \
            --event-path "$EVENT_PATH" \
            $EXTRA_ARGS
