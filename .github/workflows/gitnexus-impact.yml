name: gitnexus-impact

on:
  workflow_run:
    workflows: ["agent-pr-verify"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  impact:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Resolve AI PR from head branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if ! echo "${HEAD_BRANCH}" | grep -Eq '^(copilot|claude|codex-agent|codex)/'; then
            exit 0
          fi

          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --head "${HEAD_BRANCH}" \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            exit 0
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.pr.outputs.number != ''
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        if: steps.pr.outputs.number != ''
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        if: steps.pr.outputs.number != ''
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.pr.outputs.number != ''
        run: npm ci

      - name: Build graph
        if: steps.pr.outputs.number != ''
        run: |
          npm run registry:build
          npm run graph:build

      - name: Collect changed files
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --json files \
            --jq '.files[].path' > /tmp/changed-files.txt

      - name: Build impact report
        if: steps.pr.outputs.number != ''
        id: impact
        run: |
          python3 runtime/src/gitnexus/impact_report.py --repo . --db .gitnexus/agent-graph.db --stdin --markdown < /tmp/changed-files.txt > /tmp/impact.md
          {
            echo "body<<EOF"
            cat /tmp/impact.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          IMPACT_BODY: ${{ steps.impact.outputs.body }}
        with:
          script: |
            const body = process.env.IMPACT_BODY;
            const marker = '## GitNexus Impact Report';
            const issue_number = Number(process.env.PR_NUMBER);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
