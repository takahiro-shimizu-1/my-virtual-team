name: issue-native-plan

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  decompose:
    runs-on: ubuntu-latest
    if: contains(fromJson('["auto","copilot","claude","codex"]'), github.event.label.name)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6

      - name: Analyze issue with local planner
        id: analyze
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          root = Path.cwd()
          src = root / "runtime" / "src"
          for candidate in (src, src / "control", src / "registry"):
            if str(candidate) not in sys.path:
              sys.path.insert(0, str(candidate))

          from control.decomposer import decompose_request

          title = os.environ.get("ISSUE_TITLE", "").strip()
          body = os.environ.get("ISSUE_BODY", "").strip()
          prompt = title if not body else f"{title}\n\n{body}"
          try:
            plan = decompose_request(prompt)
            tasks = plan.get("tasks", [])
            atomic = len(tasks) <= 1
            analysis = {
              "atomic": atomic,
              "reason": "single-agent-fast-path" if atomic else plan.get("workflow_name", "multi-phase"),
              "subtasks": [task.get("title", "") for task in tasks[1:]] if len(tasks) > 1 else [],
              "primary_task": tasks[0].get("title", "") if tasks else "",
              "workflow_name": plan.get("workflow_name", ""),
            }
          except Exception as exc:
            analysis = {
              "atomic": True,
              "reason": f"local planner fallback: {exc}",
              "subtasks": [],
              "primary_task": title,
              "workflow_name": "single-agent-fast-path",
            }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"analysis={json.dumps(analysis, ensure_ascii=False)}\n")
          PY
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Handle decomposition result
        uses: actions/github-script@v7
        env:
          ANALYSIS: ${{ steps.analyze.outputs.analysis }}
          REQUESTED_LABEL: ${{ github.event.label.name }}
        with:
          script: |
            const analysis = JSON.parse(process.env.ANALYSIS || '{"atomic":true,"reason":"missing analysis","subtasks":[]}');
            const issue = context.payload.issue;
            const requestedLabel = process.env.REQUESTED_LABEL || 'auto';

            if (analysis.atomic) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Native decomposition: atomic (${analysis.reason}). Requested route remains \`${requestedLabel}\`.`,
              });
              return;
            }

            for (const subtask of analysis.subtasks || []) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subtask,
                body: `Sub-issue decomposed from #${issue.number}: ${issue.title}\n\nNative workflow will route this to the repository's subscription-native coding agent path.`,
                labels: [requestedLabel === 'gemini' ? 'auto' : requestedLabel],
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Native decomposition created ${analysis.subtasks.length} sub-issues. Reason: ${analysis.reason}`,
            });
